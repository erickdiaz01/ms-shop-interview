
# =============================================================================
# STACK COMPLETO: ms-productos + ms-inventario + Keycloak + Kafka + Observabilidad
#
# AUTENTICACION - Dos opciones:
#
#   [A] JWT via Keycloak (Postman / clientes externos)
#       POST http://localhost:8180/realms/microservicios/protocol/openid-connect/token
#       Body (form-urlencoded):
#         grant_type=password
#         client_id=ms-client
#         client_secret=ms-client-secret
#         username=user@test.com
#         password=test123
#       Usar el access_token -> Header: Authorization: Bearer <token>
#
#   [B] API Key (desarrollo rapido / service-to-service)
#       Header: X-Service-Api-Key: dev-secret-productos-key   (para :8080)
#       Header: X-Service-Api-Key: dev-secret-inventario-key  (para :8081)
#
# USUARIOS DE PRUEBA (Keycloak):
#   user@test.com    / test123    -> ROLE_USER
#   admin@test.com   / admin123   -> ROLE_ADMIN, ROLE_USER
#   service@test.com / service123 -> ROLE_SERVICE
#
# CONSOLAS:
#   Keycloak Admin: http://localhost:8180  (admin / admin)
#   Swagger :8080:  http://localhost:8080/swagger-ui.html
#   Swagger :8081:  http://localhost:8081/swagger-ui.html
#   Kafka UI:       http://localhost:8090
#   Grafana:        http://localhost:3000  (admin / admin)
#   Jaeger:         http://localhost:16686
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # IDENTITY PROVIDER
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    command: start-dev --import-realm
    ports:
      - "8180:8080"
    environment:
      KEYCLOAK_ADMIN:          admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED:       "true"
      KC_HTTP_ENABLED:         "true"
      # CRITICO: forzar que todos los tokens usen localhost:8180 como issuer.
      # Sin esto, el issuer del token cambia segun desde donde se llama Keycloak
      # (localhost vs keycloak:8080), lo que rompe la validacion JWT en los servicios.
      KC_HOSTNAME_URL:         http://localhost:8180
      KC_HOSTNAME_ADMIN_URL:   http://localhost:8180
      KC_HOSTNAME_STRICT:      "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    healthcheck:
      # curl no esta disponible en la imagen de Keycloak 24 — usar TCP nativo de bash
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q 'UP' <&3 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 90s

  # ---------------------------------------------------------------------------
  # BASES DE DATOS
  # ---------------------------------------------------------------------------
  postgres-productos:
    image: postgres:16-alpine
    container_name: postgres-productos
    environment:
      POSTGRES_DB:       productos_db
      POSTGRES_USER:     productos_user
      POSTGRES_PASSWORD: productos_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_productos_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U productos_user -d productos_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-inventario:
    image: postgres:16-alpine
    container_name: postgres-inventario
    environment:
      POSTGRES_DB:       inventario_db
      POSTGRES_USER:     inventario_user
      POSTGRES_PASSWORD: inventario_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_inventario_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventario_user -d inventario_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # KAFKA
  # ---------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      # Opcional: mantén la whitelist por si acaso
      ZOOKEEPER_4LW_COMMANDS_WHITELIST: "srvr, ruok"
    healthcheck:
      test: [ "CMD-SHELL", "echo srvr | nc localhost 2181 | grep -q 'Zookeeper version'" ]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID:                              1
      KAFKA_ZOOKEEPER_CONNECT:                      zookeeper:2181
      # Un solo listener interno - los servicios dentro de Docker lo usan directamente
      KAFKA_LISTENERS:                              PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS:                   PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:         PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME:             PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR:       1
      KAFKA_DEFAULT_REPLICATION_FACTOR:             1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR:          1
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8090:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME:             local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  # ---------------------------------------------------------------------------
  # MICROSERVICIOS
  # ---------------------------------------------------------------------------
  ms-productos:
    build:
      context:    ./ms-productos
      dockerfile: Dockerfile
    container_name: ms-productos
    ports:
      - "8080:8080"
    depends_on:
      postgres-productos:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE:  docker
      DB_HOST:                 postgres-productos
      DB_PORT:                 5432
      DB_NAME:                 productos_db
      DB_USER:                 productos_user
      DB_PASSWORD:             productos_pass
      SERVICE_API_KEY:         dev-secret-productos-key
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      # JWK_SET_URI: URL interna de Keycloak para descargar las claves publicas de firma
      # JWT_ISSUER_URI: URL publica (la que aparece en el claim 'iss' del token)
      # Estos dos valores DEBEN ser distintos cuando Keycloak esta en Docker
      JWK_SET_URI:   http://keycloak:8080/realms/microservicios/protocol/openid-connect/certs
      JWT_ISSUER_URI: http://localhost:8180/realms/microservicios
      OTEL_ENDPOINT:  http://jaeger:4318/v1/traces
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 90s

  ms-inventario:
    build:
      context:    ./ms-inventario
      dockerfile: Dockerfile
    container_name: ms-inventario
    ports:
      - "8081:8081"
    depends_on:
      postgres-inventario:
        condition: service_healthy
      kafka:
        condition: service_healthy
      ms-productos:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE:  docker
      DB_HOST:                 postgres-inventario
      DB_PORT:                 5432
      DB_NAME:                 inventario_db
      DB_USER:                 inventario_user
      DB_PASSWORD:             inventario_pass
      PRODUCTOS_SERVICE_URL:   http://ms-productos:8080
      PRODUCTOS_API_KEY:       dev-secret-productos-key
      SERVICE_API_KEY:         dev-secret-inventario-key
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWK_SET_URI:             http://keycloak:8080/realms/microservicios/protocol/openid-connect/certs
      JWT_ISSUER_URI:          http://localhost:8180/realms/microservicios
      OTEL_ENDPOINT:           http://jaeger:4318/v1/traces
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8081/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 120s

  # ---------------------------------------------------------------------------
  # OBSERVABILIDAD
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on: [prometheus]

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

    environment:
      COLLECTOR_OTLP_ENABLED: "true"

volumes:
  postgres_productos_data:
  postgres_inventario_data:
  grafana_data:
