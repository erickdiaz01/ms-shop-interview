replicaCount: 2
image:
  repository: "ACCOUNT.dkr.ecr.REGION.amazonaws.com/ms-productos"
  pullPolicy: IfNotPresent
  tag: "1.0.0"
service:
  type: ClusterIP
  port: 8080
resources:
  requests: { cpu: 200m, memory: 384Mi }
  limits:   { cpu: 800m, memory: 768Mi }
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
env:
  SPRING_PROFILES_ACTIVE: "prod"
envFromSecret:
  secretName: ms-productos-secret
livenessProbe:
  httpGet: { path: /actuator/health/liveness, port: 8080 }
  initialDelaySeconds: 40
  periodSeconds: 30
  failureThreshold: 3
readinessProbe:
  httpGet: { path: /actuator/health/readiness, port: 8080 }
  initialDelaySeconds: 20
  periodSeconds: 15
  failureThreshold: 3
