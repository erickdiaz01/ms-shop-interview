spring:
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST}:5432/${DB_NAME}
  flyway:
    url: jdbc:postgresql://${DB_HOST}:5432/${DB_NAME}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI}
logging:
  config: classpath:logback-spring.xml
  level:
    com.company: WARN
management:
  tracing:
    sampling:
      probability: 0.05
